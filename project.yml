name: vibePane
options:
  bundleIdPrefix: com.vibepane
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.30"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  vibePane:
    type: application
    platform: macOS
    sources:
      - vibePane
    info:
      path: vibePane/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: vibePane
        CFBundleDisplayName: vibePane
        CFBundleIdentifier: com.vibepane.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        NSHumanReadableCopyright: "Copyright © 2026 vibePane contributors."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vibepane.app
        INFOPLIST_FILE: vibePane/Info.plist
        CODE_SIGN_STYLE: Automatic
        PRODUCT_NAME: vibePane
